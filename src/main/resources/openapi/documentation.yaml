openapi: 3.0.3
info:
  title: Mom Care Platform API
  description: Mom Care Platform API - Production-ready backend with authentication, profile management, e-commerce, and admin operations. Uses Gson for JSON deserialization with enhanced validation.
  version: 1.0.0
  contact:
    name: Mom Care Platform Support
    email: support@momcare.com
    url: https://momcare.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Development server
  - url: https://api.momcare.com
    description: Production server

security:
  - BearerAuth: [ ]

tags:
  - name: Health
    description: Server health and status
  - name: Authentication
    description: User registration and login
  - name: Categories
    description: Product categories management
  - name: File Upload
    description: File management and serving
  - name: Moms
    description: Mom profile management
  - name: Doctors
    description: Doctor profile management
  - name: Admin
    description: Administrative operations
  - name: Products
    description: Product catalog management (requires mom authorization)
  - name: SKU Offers
    description: Product offers and pricing (requires mom authorization)
  - name: Shopping Cart
    description: Shopping cart operations (requires mom authorization)
  - name: Orders
    description: Order management operations (requires mom authorization)

paths:
  /:
    get:
      operationId: healthCheck
      tags: [ Health ]
      summary: Health check endpoint
      description: Returns welcome message to verify server is running
      security: [ ]
      responses:
        "200":
          description: Server is running
          content:
            text/plain:
              schema:
                type: string
                example: "Mom Project API - Welcome!"

  /health:
    get:
      operationId: getHealth
      tags: [ Health ]
      summary: Get service health status
      description: Returns comprehensive health status including service info, timestamp, and environment
      security: [ ]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicApiResponse'
              example:
                success: true
                data:
                  status: "UP"
                  timestamp: "2024-01-15T10:30:00Z"
                  service: "Mom Care Platform Backend"
                  version: "1.0.0"
                  environment: "development"
                message: "Service is healthy"

  /health/ready:
    get:
      operationId: getReadiness
      tags: [ Health ]
      summary: Get service readiness status
      description: Returns readiness status with database and external service checks
      security: [ ]
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicApiResponse'
              example:
                success: true
                data:
                  status: "READY"
                  timestamp: "2024-01-15T10:30:00Z"
                  checks:
                    database: "UP"
                    cache: "UP"
                    external_services: "UP"
                message: "Service is ready"

  /health/live:
    get:
      operationId: getLiveness
      tags: [ Health ]
      summary: Get service liveness status
      description: Simple liveness check for container orchestration
      security: [ ]
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicApiResponse'
              example:
                success: true
                data:
                  status: "ALIVE"
                message: "Service is alive"

  /uploads/{filename}:
    get:
      operationId: serveFile
      tags: [ File Upload ]
      summary: Serve uploaded files
      description: Access uploaded files like photos and documents
      security: [ ]
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
          description: Name of the file to serve
      responses:
        "200":
          description: File served successfully
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
        "404":
          description: File not found

  /api/auth/register/mom:
    post:
      operationId: registerMom
      tags: [ Authentication ]
      summary: Register new mom with file uploads
      description: Register a new mom user with multipart form data including photos and NID documents. Returns same response format as login for consistency.
      security: [ ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                data:
                  type: string
                  description: JSON string containing registration data
                  example: '{"email":"jane.doe@example.com","password":"securepassword123","fullName":"Jane Doe","phone":"+1-555-1234","maritalStatus":"MARRIED"}'
                photo:
                  type: string
                  format: binary
                  description: Profile photo file (required)
                nidFront:
                  type: string
                  format: binary
                  description: National ID front image (required)
                nidBack:
                  type: string
                  format: binary
                  description: National ID back image (required)
              required:
                - data
                - photo
                - nidFront
                - nidBack
              examples:
                completeRegistration:
                  summary: Complete mom registration with all fields
                  description: Example of a complete mom registration with all required fields
                  value:
                    data: '{"email":"jane.doe@example.com","password":"securepassword123","fullName":"Jane Doe","phone":"+1-555-1234","maritalStatus":"MARRIED"}'
                    photo: "[Binary file: profile_photo.jpg]"
                    nidFront: "[Binary file: nid_front.jpg]"
                    nidBack: "[Binary file: nid_back.jpg]"
                minimalRegistration:
                  summary: Minimal mom registration
                  description: Example with minimal required fields
                  value:
                    data: '{"email":"alice.smith@example.com","password":"password123","fullName":"Alice Smith","phone":"+1-555-9876","maritalStatus":"SINGLE"}'
                    photo: "[Binary file: profile_photo.png]"
                    nidFront: "[Binary file: nid_front.png]"
                    nidBack: "[Binary file: nid_back.png]"
      responses:
        "200":
          description: Registration successful - returns same response format as login
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationResponse"
        "400":
          description: Invalid request data or validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
              examples:
                invalidEmail:
                  summary: Invalid email format
                  value:
                    success: false
                    message: "Invalid email format"
                invalidPassword:
                  summary: Password too short
                  value:
                    success: false
                    message: "Password must be at least 6 characters long"
                invalidPhone:
                  summary: Invalid phone format
                  value:
                    success: false
                    message: "Invalid phone number format. Please use a valid phone number."
                invalidMaritalStatus:
                  summary: Invalid marital status
                  value:
                    success: false
                    message: "Invalid marital status. Must be one of: SINGLE, MARRIED, DIVORCED, WIDOWED"
                fieldsBlank:
                  summary: Missing required fields
                  value:
                    success: false
                    message: "All required fields must be provided"
        "409":
          description: Email already exists

  /api/auth/register/doctor:
    post:
      operationId: registerDoctor
      tags: [ Authentication ]
      summary: Register new doctor with file uploads
      description: Register a new doctor user with multipart form data including photos and NID documents. Returns same response format as login for consistency.
      security: [ ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                data:
                  type: string
                  description: JSON string containing registration data
                  example: '{"email":"dr.smith@example.com","password":"securepassword123","name":"Dr. John Smith","phone":"+1-555-5678","specialization":"PSYCHIATRIST"}'
                photo:
                  type: string
                  format: binary
                  description: Profile photo file (required)
                nidFront:
                  type: string
                  format: binary
                  description: National ID front image (required)
                nidBack:
                  type: string
                  format: binary
                  description: National ID back image (required)
              required:
                - data
                - photo
                - nidFront
                - nidBack
              examples:
                completeDoctorRegistration:
                  summary: Complete doctor registration with all fields
                  description: Example of a complete doctor registration with all required fields
                  value:
                    data: '{"email":"dr.smith@example.com","password":"securepassword123","name":"Dr. John Smith","phone":"+1-555-5678","specialization":"PSYCHIATRIST"}'
                    photo: "[Binary file: doctor_photo.jpg]"
                    nidFront: "[Binary file: doctor_nid_front.jpg]"
                    nidBack: "[Binary file: doctor_nid_back.jpg]"
                cardiologistRegistration:
                  summary: Cardiologist registration example
                  description: Example registration for a cardiologist
                  value:
                    data: '{"email":"dr.jones@example.com","password":"password123","name":"Dr. Sarah Jones","phone":"+1-555-2468","specialization":"FAMILY_THERAPIST"}'
                    photo: "[Binary file: cardiologist_photo.png]"
                    nidFront: "[Binary file: cardiologist_nid_front.png]"
                    nidBack: "[Binary file: cardiologist_nid_back.png]"
      responses:
        "200":
          description: Registration successful - returns same response format as login
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationResponse"
        "400":
          description: Invalid request data or validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
              examples:
                invalidEmail:
                  summary: Invalid email format
                  value:
                    success: false
                    message: "Invalid email format"
                invalidPassword:
                  summary: Password too short
                  value:
                    success: false
                    message: "Password must be at least 6 characters long"
                invalidPhone:
                  summary: Invalid phone format
                  value:
                    success: false
                    message: "Invalid phone number format. Please use a valid phone number."
                invalidSpecialization:
                  summary: Invalid specialization
                  value:
                    success: false
                    message: "Invalid specialization. Must be one of: PSYCHIATRIST, CLINICAL_PSYCHOLOGIST, COUNSELING_PSYCHOLOGIST, PERINATAL_MENTAL_HEALTH, FAMILY_THERAPIST, TRAUMA_THERAPIST, COGNITIVE_BEHAVIORAL_THERAPIST, GROUP_THERAPIST"
                fieldsBlank:
                  summary: Missing required fields
                  value:
                    success: false
                    message: "All required fields must be provided"
        "409":
          description: Email already exists

  /api/auth/login:
    post:
      operationId: login
      tags: [ Authentication ]
      summary: Universal login for all user types
      description: Login endpoint for both Moms and Doctors, returns JWT token with refresh token
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LoginSuccessResponse"
                  - $ref: "#/components/schemas/LoginErrorResponse"

  /api/auth/refresh:
    post:
      operationId: refreshToken
      tags: [ Authentication ]
      summary: Refresh access token
      description: Use refresh token to get a new access token. Access tokens expire in 30 minutes, refresh tokens expire in 30 days with 24-hour idle timeout.
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessResponse"
        "400":
          description: Invalid request format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicApiResponse"
              example:
                success: false
                message: "Invalid request format"
        "401":
          description: Refresh token invalid, expired, or idle timeout exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicApiResponse"
              example:
                success: false
                message: "Refresh token is invalid, expired, or idle timeout exceeded. Please login again."

  /api/auth/logout:
    post:
      operationId: logout
      tags: [ Authentication ]
      summary: Logout user
      description: Revoke refresh token to logout user from all devices
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Logout response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicApiResponse"
              examples:
                success:
                  summary: Logout successful
                  value:
                    success: true
                    message: "Logged out successfully"
                failure:
                  summary: Logout failed
                  value:
                    success: false
                    message: "Logout failed"
        "400":
          description: Invalid request format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicApiResponse"
              example:
                success: false
                message: "Invalid request format"

  /api/categories:
    get:
      operationId: getAllCategories
      tags: [ Categories ]
      summary: Get all categories (Public)
      description: Retrieve all product categories - public access for browsing
      security: [ ]
      responses:
        "200":
          description: Categories retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"

  /api/categories/{id}:
    get:
      operationId: getCategoryById
      tags: [ Categories ]
      summary: Get category by ID (Public)
      description: Retrieve a specific category by its ID - public access for browsing
      security: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Category ID
      responses:
        "200":
          description: Category retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "404":
          description: Category not found

  /api/moms/profile:
    get:
      operationId: getMomProfile
      tags: [ Moms ]
      summary: Get mom profile
      description: Get current mom's profile (requires authentication)
      responses:
        "200":
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MomProfileResponse"
        "401":
          description: Unauthorized
        "404":
          description: Profile not found
    put:
      operationId: updateMomProfile
      tags: [ Moms ]
      summary: Update mom profile
      description: Update mom profile with optional photo upload (requires authentication)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMomProfileRequest"
            examples:
              updateNameAndPhone:
                summary: Update name and phone
                description: Example of updating mom's name and phone number
                value:
                  fullName: "Alice Johnson Updated"
                  phone: "+1-555-9999"
                  maritalStatus: "DIVORCED"
              updateMaritalStatus:
                summary: Update marital status only
                description: Example of updating only the marital status
                value:
                  maritalStatus: "MARRIED"
              completeUpdate:
                summary: Complete profile update
                description: Example of updating all available fields
                value:
                  fullName: "Alice Smith"
                  phone: "+1-555-1234"
                  maritalStatus: "SINGLE"
          multipart/form-data:
            schema:
              type: object
              properties:
                data:
                  type: string
                  description: JSON string containing profile data (all fields optional)
                  example: '{"fullName":"Alice Johnson","phone":"+1234567890","maritalStatus":"MARRIED","photo":"updated_photo.jpg"}'
                photo:
                  type: string
                  format: binary
                  description: Profile photo file (optional)
              required:
                - data
              examples:
                updateWithPhoto:
                  summary: Update mom profile with new photo
                  description: Example of updating mom profile with a new profile photo
                  value:
                    data: '{"fullName":"Alice Johnson","phone":"+1234567890","maritalStatus":"MARRIED","photo":"updated_photo.jpg"}'
                    photo: "[Binary file data]"
                updatePartialData:
                  summary: Update mom profile with partial data
                  description: Example of updating only specific fields (all fields are optional)
                  value:
                    data: '{"fullName":"Alice Smith"}'
                updateWithPhoneOnly:
                  summary: Update mom profile phone only
                  description: Example of updating only the phone number
                  value:
                    data: '{"phone":"+1-555-1234"}'
                updateWithoutPhoto:
                  summary: Update mom profile without photo
                  description: Example of updating mom profile data without changing photo
                  value:
                    data: '{"fullName":"Alice Johnson","phone":"+1-555-8888","maritalStatus":"MARRIED","photo":"existing_photo.jpg"}'
                    photo: "[Binary file: existing_photo.jpg]"
                minimalUpdate:
                  summary: Minimal profile update
                  description: Example of updating only the name
                  value:
                    data: '{"fullName":"Alice Smith","phone":"+1-555-1234","maritalStatus":"MARRIED","photo":"current_photo.jpg"}'
                    photo: "[Binary file: current_photo.jpg]"
                photo:
                  type: string
                  format: binary
                  description: Optional profile photo
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicApiResponse"
        "400":
          description: Invalid request data
        "401":
          description: Unauthorized

  /api/moms/sessions:
    put:
      operationId: updateMomSessions
      tags: [ Moms ]
      summary: Update mom sessions
      description: Update mom's session count (requires authentication). The numberOfSessions field is required - requests without this field will be rejected with 400 Bad Request to prevent accidental session resets.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionsRequest"
            examples:
              increaseSessions:
                summary: Increase session count
                description: Example of increasing mom's session count
                value:
                  numberOfSessions: 15
              authorizeMom:
                summary: Authorize mom for e-commerce
                description: Example of setting sessions to authorize mom for e-commerce access
                value:
                  numberOfSessions: 8
              resetSessions:
                summary: Reset session count
                description: Example of resetting session count to zero
                value:
                  numberOfSessions: 0
              malformedRequest:
                summary: Malformed request (will be rejected)
                description: Example of a malformed request that will be rejected with 400 Bad Request
                value: {}
      responses:
        "200":
          description: Sessions updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicApiResponse"
        "400":
          description: Invalid request data
        "401":
          description: Unauthorized

  /api/moms/check-authorization:
    get:
      operationId: checkMomAuthorization
      tags: [ Moms ]
      summary: Check mom authorization status
      description: Get current mom's authorization status and session count. Accessible to both authorized and unauthorized moms (requires mom authentication)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Authorization status retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BasicApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          isAuthorized:
                            type: boolean
                            example: true
                            description: Whether mom has completed enough sessions for e-commerce access
                          momId:
                            type: string
                            example: "mom_jane"
              examples:
                authorized_mom:
                  summary: Authorized mom response
                  value:
                    success: true
                    data:
                      isAuthorized: true
                      momId: "mom_jane"
                unauthorized_mom:
                  summary: Unauthorized mom response
                  value:
                    success: true
                    data:
                      isAuthorized: false
                      momId: "mom_alice"
        "401":
          description: Unauthorized - requires mom authentication

  /api/doctors/check-authorization:
    get:
      operationId: checkDoctorAuthorization
      tags: [ Doctors ]
      summary: Check doctor authorization status
      description: Get current doctor's authorization status. Accessible to both authorized and unauthorized doctors (requires doctor authentication)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Authorization status retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BasicApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          isAuthorized:
                            type: boolean
                            example: true
                            description: Whether doctor has been authorized by admin
                          doctorId:
                            type: string
                            example: "doctor_john"
              examples:
                authorized_doctor:
                  summary: Authorized doctor response
                  value:
                    success: true
                    data:
                      isAuthorized: true
                      doctorId: "doctor_john"
                unauthorized_doctor:
                  summary: Unauthorized doctor response
                  value:
                    success: true
                    data:
                      isAuthorized: false
                      doctorId: "doctor_brown"
        "401":
          description: Unauthorized - requires doctor authentication

  /api/doctors/profile:
    get:
      operationId: getDoctorProfile
      tags: [ Doctors ]
      summary: Get doctor profile
      description: Get current doctor's profile (requires authentication)
      responses:
        "200":
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorProfileResponse"
        "401":
          description: Unauthorized
        "404":
          description: Profile not found
    put:
      operationId: updateDoctorProfile
      tags: [ Doctors ]
      summary: Update doctor profile
      description: "Update doctor profile with optional photo upload (requires authentication). Uses Gson for JSON deserialization."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDoctorProfileRequest"
            examples:
              updateNameAndPhone:
                summary: Update name and phone
                description: Example of updating doctor's name and phone number
                value:
                  name: "Dr. John Smith Updated"
                  phone: "+1-555-8888"
                  specialization: "FAMILY_THERAPIST"
              updateSpecialization:
                summary: Update specialization only
                description: Example of updating only the specialization
                value:
                  specialization: "CLINICAL_PSYCHOLOGIST"
              completeUpdate:
                summary: Complete profile update
                description: Example of updating all available fields
                value:
                  name: "Dr. Sarah Jones"
                  phone: "+1-555-2468"
                  specialization: "PSYCHIATRIST"
          multipart/form-data:
            schema:
              type: object
              properties:
                data:
                  type: string
                  description: JSON string containing profile data (all fields optional) - uses Gson for lenient parsing
                  example: '{"name":"Dr. John Smith","phone":"+1234567890","specialization":"PSYCHIATRIST","photo":"updated_photo.jpg"}'
                photo:
                  type: string
                  format: binary
                  description: Profile photo file (optional)
              required:
                - data
              examples:
                updateWithPhoto:
                  summary: Update doctor profile with new photo
                  description: Example of updating doctor profile with a new profile photo
                  value:
                    data: '{"name":"Dr. John Smith","phone":"+1234567890","specialization":"PSYCHIATRIST","photo":"updated_photo.jpg"}'
                    photo: "[Binary file data]"
                updatePartialData:
                  summary: Update doctor profile with partial data
                  description: Example of updating only specific fields (all fields are optional)
                  value:
                    data: '{"name":"Dr. Sarah Jones"}'
                updateSpecializationOnly:
                  summary: Update doctor specialization only
                  description: Example of updating only the specialization
                  value:
                    data: '{"specialization":"CLINICAL_PSYCHOLOGIST"}'
                updateWithoutPhoto:
                  summary: Update doctor profile without photo
                  description: Example of updating doctor profile data without changing photo
                  value:
                    data: '{"name":"Dr. John Smith","phone":"+1-555-8888","specialization":"FAMILY_THERAPIST","photo":"existing_photo.jpg"}'
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorProfileResponse"
              examples:
                success:
                  summary: Profile updated successfully
                  value:
                    success: true
                    data:
                      id: "doc_brown"
                      name: "Dr. John Smith Updated"
                      email: "dr.brown@example.com"
                      phone: "+1-555-8888"
                      specialization: "FAMILY_THERAPIST"
                      photo: "uploads/doctor_photo.jpg"
        "400":
          description: Invalid request data or validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
              examples:
                invalidSpecialization:
                  summary: Invalid specialization
                  value:
                    success: false
                    message: "Invalid specialization"
                invalidPhone:
                  summary: Invalid phone format
                  value:
                    success: false
                    message: "Invalid phone number format"
                emptyName:
                  summary: Empty name
                  value:
                    success: false
                    message: "Name cannot be empty"
                malformedJson:
                  summary: Malformed JSON
                  value:
                    success: false
                    message: "Invalid request data. Please check that all required fields are provided and properly formatted."
        "401":
          description: Unauthorized
        "404":
          description: Profile not found

  /api/products:
    get:
      operationId: getAllProducts
      tags: [ Products ]
      summary: Get all products (Authorized Moms only)
      description: "Get paginated list of all products - requires mom authentication AND authorization (isAuthorized: true). Moms with insufficient sessions (<4) will receive 403 Forbidden."
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Page number (0-based)
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Page size
      responses:
        "200":
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
        "401":
          description: Unauthorized - requires mom authentication
        "403":
          description: Access denied - Mom must be authorized to access products

  /api/products/{id}:
    get:
      operationId: getProductById
      tags: [ Products ]
      summary: Get product by ID (Moms only)
      description: Get specific product details by ID - requires mom authentication and authorization
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Product ID
      responses:
        "200":
          description: Product retrieved successfully
          content:
            application/json:
