components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login endpoint

  schemas:
    BasicApiResponse:
      type: object
      description: Standard API response format
      properties:
        success:
          type: boolean
          description: Request success status
          example: true
        message:
          type: string
          description: Response message
          example: "Operation completed successfully"
        data:
          type: object
          description: Response data (varies by endpoint)
      required: [ success ]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: "alice@example.com"
        password:
          type: string
          format: password
          example: "password123"
      required: [ email, password ]

    LoginSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/BasicApiResponse"
        - type: object
          properties:
            data:
              type: object
              properties:
                userId:
                  type: string
                  example: "mom_alice"
                  description: "Unique identifier for the authenticated user"
                token:
                  type: string
                  example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  description: "JWT access token for authentication (expires in 30 minutes)"
                refreshToken:
                  type: string
                  example: "MJCvRLCw7vw_lo2PU3KCN4zrHB1BfT_X86SW63zLWuk"
                  description: "Refresh token for obtaining new access tokens (expires in 30 days with 24-hour idle timeout)"
                userType:
                  type: string
                  enum: [ MOM, DOCTOR ]
                  example: "MOM"
                  description: "Type of authenticated user"
                expiresIn:
                  type: integer
                  example: 1800
                  description: "Access token expiration time in seconds (30 minutes)"
                refreshExpiresIn:
                  type: integer
