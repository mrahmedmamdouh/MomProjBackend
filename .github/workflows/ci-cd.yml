name: Mom Care Platform CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  checks: write
  pull-requests: write
  statuses: write

jobs:
  build:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 🐘 Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: 🧪 Run Tests
      id: tests
      run: |
        gradle test --stacktrace && echo "result=pass" >> $GITHUB_OUTPUT || echo "result=fail" >> $GITHUB_OUTPUT

    - name: 📊 Check for test results
      id: check_results
      run: |
        if ls build/test-results/test/*.xml 1>/dev/null 2>&1; then
          echo "found=true" >> $GITHUB_OUTPUT
        else
          echo "found=false" >> $GITHUB_OUTPUT
          echo "⚠️ No test result XML files found — skipping report"
        fi

    - name: 📊 Publish Test Report
      if: steps.check_results.outputs.found == 'true'
      uses: dorny/test-reporter@v1
      with:
        name: 🧪 Ktor Backend Test Results
        path: build/test-results/test/*.xml
        reporter: java-junit
        fail-on-error: false

    - name: 🏗️ Build Fat Jar
      run: gradle buildFatJar -x test --stacktrace
