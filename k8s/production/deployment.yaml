apiVersion: apps/v1
kind: Deployment
metadata:
  name: mom-care-platform-production
  namespace: production
  labels:
    app: mom-care-platform
    environment: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mom-care-platform
      environment: production
  template:
    metadata:
      labels:
        app: mom-care-platform
        environment: production
    spec:
      containers:
      - name: mom-care-platform
        image: mom-care-platform:latest
        ports:
        - containerPort: 8080
        env:
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: mom-care-secrets
              key: mongodb-uri
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: mom-care-secrets
              key: jwt-secret
        - name: JWT_ISSUER
          value: "https://momcare.com"
        - name: JWT_AUDIENCE
          value: "momcare-api"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: mom-care-platform-production-service
  namespace: production
spec:
  selector:
    app: mom-care-platform
    environment: production
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mom-care-platform-production-ingress
  namespace: production
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - momcare.com
    - www.momcare.com
    secretName: mom-care-platform-production-tls
  rules:
  - host: momcare.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mom-care-platform-production-service
            port:
              number: 80
  - host: www.momcare.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mom-care-platform-production-service
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mom-care-platform-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mom-care-platform-production
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
